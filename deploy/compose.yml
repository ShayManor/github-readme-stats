name: ghstats

services:
  fetcher:
    image: ghcr.io/shaymanor/ghstats-fetcher:${IMAGE_TAG:-latest}
    container_name: ghstats-fetcher
    restart: unless-stopped
    environment:
      GITHUB_PAT: ${GITHUB_PAT:?missing GITHUB_PAT}
      FETCHER_INTERNAL_TOKEN: ${FETCHER_INTERNAL_TOKEN:?missing FETCHER_INTERNAL_TOKEN}
    volumes:
      - ${HOME}/ghstats/data/fetcher:/app/data
    ports:
      - "127.0.0.1:5001:5001"

  fetcher-cron:
    image: ghcr.io/shaymanor/ghstats-fetcher:${IMAGE_TAG:-latest}
    container_name: ghstats-fetcher-cron
    restart: unless-stopped
    command: ["python", "-m", "src.cron"]
    environment:
      GITHUB_PAT: ${GITHUB_PAT:?missing GITHUB_PAT}
      FETCHER_INTERNAL_TOKEN: ${FETCHER_INTERNAL_TOKEN:?missing FETCHER_INTERNAL_TOKEN}
    volumes:
      - ${HOME}/ghstats/data/fetcher:/app/data
    depends_on:
      - fetcher

  generator:
    image: ghcr.io/shaymanor/ghstats-generator:${IMAGE_TAG:-latest}
    container_name: ghstats-generator
    restart: unless-stopped
    environment:
      FETCHER_URL: http://fetcher:5001
      FETCHER_INTERNAL_TOKEN: ${FETCHER_INTERNAL_TOKEN:?missing FETCHER_INTERNAL_TOKEN}
      GH_OAUTH_CLIENT_ID: ${GH_OAUTH_CLIENT_ID:?missing GH_OAUTH_CLIENT_ID}
      GH_OAUTH_CLIENT_SECRET: ${GH_OAUTH_CLIENT_SECRET:?missing GH_OAUTH_CLIENT_SECRET}
      GENERATOR_SECRET_KEY: ${GENERATOR_SECRET_KEY:?missing GENERATOR_SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://gh-stats.com}
      BUILD_VERSION: ${IMAGE_TAG:-}
    volumes:
      - ${HOME}/ghstats/data/generator:/app/data
    ports:
      - "127.0.0.1:5002:5002"
    depends_on:
      - fetcher

  generator-worker:
    image: ghcr.io/shaymanor/ghstats-generator:${IMAGE_TAG:-latest}
    container_name: ghstats-generator-worker
    restart: unless-stopped
    command: ["python", "-m", "src.worker"]
    environment:
      FETCHER_URL: http://fetcher:5001
      FETCHER_INTERNAL_TOKEN: ${FETCHER_INTERNAL_TOKEN:?missing FETCHER_INTERNAL_TOKEN}
      BUILD_VERSION: ${IMAGE_TAG:-}
    volumes:
      - ${HOME}/ghstats/data/generator:/app/data
    depends_on:
      - generator

  generator-cron:
    image: ghcr.io/shaymanor/ghstats-generator:${IMAGE_TAG:-latest}
    container_name: ghstats-generator-cron
    restart: unless-stopped
    command: ["python", "-m", "src.cron"]
    environment:
      FETCHER_URL: http://fetcher:5001
      FETCHER_INTERNAL_TOKEN: ${FETCHER_INTERNAL_TOKEN:?missing FETCHER_INTERNAL_TOKEN}
      BUILD_VERSION: ${IMAGE_TAG:-}
    volumes:
      - ${HOME}/ghstats/data/generator:/app/data
    depends_on:
      - generator

  edge:
    image: ghcr.io/shaymanor/ghstats-edge:${IMAGE_TAG:-latest}
    container_name: ghstats-edge
    restart: unless-stopped
    environment:
      GENERATOR_URL: http://generator:5002
    ports:
      - "127.0.0.1:5003:5003"
    depends_on:
      - generator
